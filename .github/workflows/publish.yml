name: Publish Packages

on:
  push:
    tags:
      - "v*" # v0.1.0, v1.8.1, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@premast"
          cache: "pnpm"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      # Take the version from the tag so the released artifacts match
      # what the tag promises. `sync-versions.js <version>` rewrites
      # every package.json to the tag version; the `--fix` behaviour
      # is implied when a version argument is passed.
      - name: Sync package versions to tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Publishing version: $VERSION"
          node scripts/sync-versions.js "$VERSION"

      - name: Build CLI (copy starter template)
        run: pnpm build:cli

      # `pnpm -r publish` picks up every workspace member that isn't
      # `"private": true`, so adding a new @premast package only
      # requires registering it in scripts/sync-versions.js — no
      # workflow change needed. --no-git-checks skips the pre-publish
      # clean-tree requirement (we just mutated package.json versions).
      - name: Publish all packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm -r publish --no-git-checks --access restricted
